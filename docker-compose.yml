services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - OLLAMA_BASE_URL=http://backend:11434
    depends_on:
      backend:
        condition: service_started
    networks:
      - speaknest

  piper:
    build: ./services/piper
    networks:
      - speaknest

  whisper:
    build: ./services/whisper
    ports:
      - "8001:8000"
    networks:
      - speaknest

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://192.168.1.103:11434
      - VITE_API_BASE_URL=http://frontend:3000
      - STT_BASE_URL=http://whisper:8000
      - TTS_BASE_URL=http://piper:5000
    volumes:
      - data:/data
      - recordings:/recordings
    depends_on:
      piper:
        condition: service_healthy
      whisper:
        condition: service_healthy
    networks:
      - speaknest

# Ollama is running on remote server 192.168.1.103
# ollama:
#   image: ollama/ollama
#   ports:
#     - "11434:11434"
#   volumes:
#     - ollama-data:/ollama/data
#   networks:
#     - speaknest

# --- Without docker ---
# Backend: cd backend && uvicorn app.main:app --reload --port 8000
# Frontend: cd frontend && npm run dev

networks:
  speaknest:
    driver: bridge

volumes:
  data:
  recordings:
  ollama-data:
